# Architecture Violation Exclusions
# Format: function_pattern:reason=explanation
#
# Only special-case functions that cannot follow standard architectural rules
# should be excluded. Most functions should be scanned for violations.

__bootstrap1:reason=bootstrap combinator (must work without database)
___bootstrap2:reason=bootstrap batch combinator (creates .tmp for batch execution, chicken-and-egg)
_init*:reason=database initialization (creates directory structure)
_help*:reason=help system (pure output, no state modification)
_validate*:reason=validation framework (reads state then delegates)
_batch2:reason=batch executor meta-function (echoes for progress, executes directly)
_lift*:reason=init infrastructure (copies phase templates)
_dumpenv*:reason=environment dump special case
